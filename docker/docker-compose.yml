services:

  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    container_name: mars_mlflow
    ports:
      - "5001:5001"
    volumes:
      - ../mlruns:/mlflow/mlruns
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5001
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlruns/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/mlruns
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mars_api
    command: ["api"]
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../results:/app/results
      - ../mlruns:/app/mlruns
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - NO_PROXY=localhost,127.0.0.1,mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mars_ui
    command: ["ui"]
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../results:/app/results
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped