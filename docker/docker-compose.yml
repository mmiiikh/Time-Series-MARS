services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mars_api
    command: ["api"]
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    env_file:
      - .env

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mars_ui
    command: ["ui"]
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ..:/app
    env_file:
      - .env

  mlflow:
    image: python:3.10-slim
    container_name: mars_mlflow
    working_dir: /app
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri /app/mlruns
               --default-artifact-root /app/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ..:/app