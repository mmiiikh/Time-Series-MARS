services:
  postgres:
    image: postgres:15
    container_name: mars_postgres
    environment:
      POSTGRES_DB: mars
      POSTGRES_USER: mars_user
      POSTGRES_PASSWORD: mars_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mars_app
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mars
      DB_USER: mars_user
      DB_PASSWORD: mars_password
    volumes:
      - ..:/app
    tty: true
    entrypoint: [ "bash", "docker/entrypoint.sh" ]

volumes:
  postgres_data: